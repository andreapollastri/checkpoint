stages:
  - security

checkpoint:
  stage: security
  image: composer:2
  cache:
    key:
      files:
        - composer.lock
    paths:
      - vendor/
  script:
    - composer install --prefer-dist --no-progress --no-interaction
    - php artisan checkpoint:scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
